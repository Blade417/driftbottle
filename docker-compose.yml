services:
  db:
    image: postgres:16-alpine
    container_name: driftbottle-db
    environment:
      POSTGRES_USER: driftbottle
      POSTGRES_PASSWORD: driftbottle123
      POSTGRES_DB: driftbottle
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
